<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="css/style.css">
     <link rel="stylesheet" href="js/script.js">
    <style>
        .login-wrapper {
            min-height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8f9fa;

        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <div class="login-wrapper">
        <form class="bg-white p-3 rounded-4 shadow" style="width:300px;">

            <!-- LOGO -->
            <div class="text-center mb-2">
                <img src="images/logo.png" alt="SkillUp Logo" height="100" class="logo">
            </div>

            <div class="text-center fw-semibold py-2 rounded-3 mb-3 bg-success text-white">
                Welcome back!
            </div>

            <div class="mb-2">
                <label class="form-label small">Email:</label>
                <input type="email" class="form-control form-control-sm" placeholder="Enter your Email">
            </div>

            <div class="mb-2">
                <label class="form-label small">Password:</label>
                <input type="password" class="form-control form-control-sm" placeholder="Enter your Password">
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2 small">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a href="#" class="text-decoration-none">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-sm mb-2">
                Log In
            </button>

            <p class="text-center text-muted small mb-2">or</p>

            <button type="button" class="btn btn-secondary w-100 btn-sm mb-2">
                <img src="{% static 'images/google.png' %}" alt="Google Logo"
                    style="height: 37px; width: 37px; margin-right: 1px;">
                Login with your Google Account
            </button>

            <p class="text-center small mb-0">
                Don't have an account? <a href="#" class="text-decoration-none">Sign Up</a>
            </p>

        </form>
    </div>
    <div id="footer"></div>
    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
       $(document).ready(function () {
        // Load components
        $("#navbar").load("components/navbar.html");
        $("#footer").load("components/footer.html");
      });
    </script>
</body>

</html>
