<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillUp - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .auth-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: none;
        }

        .brand-logo-circle {
            width: 48px;
            height: 48px;
            background-color: #00b359;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.5rem;
            margin: 0 auto 20px;
        }

        h2 { font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .form-label { font-weight: 500; font-size: 0.85rem; color: #475569; margin-bottom: 6px; }
        .input-group { border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 15px; }
        .input-group-text { background: white; border-right: none; color: #94a3b8; }
        .form-control { border-left: none; padding: 12px; border-radius: 8px; font-size: 0.95rem; }
        .form-control:focus { box-shadow: none; border-color: #dee2e6; }

        .btn-skillup {
            background-color: #00b359;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-skillup:hover { background-color: #008f47; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin: 25px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-google {
            border: 1px solid #e2e8f0;
            background: white;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #475569;
        }

        .auth-footer-link { font-size: 0.85rem; color: #64748b; margin-top: 25px; }
        .auth-footer-link a { color: #00b359; text-decoration: none; font-weight: 700; }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .form-check-input:checked { background-color: #00b359; border-color: #00b359; }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div class="brand-logo-circle">S</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to continue your journey</p>

            <form id="loginForm" class="text-start">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
                </div>

                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                </div>

                <div class="remember-forgot">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label text-secondary" for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="text-success text-decoration-none">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-skillup">Sign In</button>
            </form>

            <div class="divider">Or continue with</div>

            <button class="btn btn-google">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt="Google">
                Sign in with Google
            </button>

            <p class="auth-footer-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Load components
            $("#navbar").load("components/navbar.html");
            $("#footer").load("components/footer.html");

            // 1. Handling Login Submission
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                
                const enteredEmail = $('#loginEmail').val();
                const enteredPass = $('#loginPassword').val();

                // Retrieve data from LocalStorage (from Sign-Up)
                const storedEmail = localStorage.getItem('userEmail');
                const storedPass = localStorage.getItem('userPassword');

                // Simulation: if no user is found in storage, we check against a default
                if (!storedEmail) {
                    alert("No account found. Please sign up first.");
                    window.location.href = "signup.html";
                    return;
                }

                // 2. Authentication Logic
                if (enteredEmail === storedEmail && enteredPass === storedPass) {
                    alert("Login Successful! Redirecting to Dashboard...");
                    window.location.href = "pages/dashboard.html";
                } else {
                    alert("Invalid Email or Password. Please try again.");
                }
            });
        });
    </script>
</body>
</html>
