        #skillUpNavbar .nav-link:hover::after,

            width: 80%;
        }

        #skillUpNavbar .nav-link.active-page {
            color: #10b981 !important;

<script>
    $(document).ready(function () {
        // 1. Highlight Active Page automatically
        var path = window.location.pathname.split("/").pop();
        if (path == '') path = 'home.html'; // Default if empty

        $('.nav-link').each(function() {
            var href = $(this).attr('href');
            if (path === href) {
                $(this).addClass('active-page');
            }
        });

        // 2. Smooth Redirect Animation
        $('.nav-link, .navbar-brand, .btn-link, .btn-success').on('click', function (e) {
            var targetUrl = $(this).attr('href');

            // Only animate if it's a real link and not a '#' or a dummy link
            if (targetUrl && targetUrl !== "#" && !targetUrl.startsWith('http')) {
                e.preventDefault();
                
                // Add fade-out effect to the main page content
                $('body').animate({ opacity: 0 }, 300, function() {
                    window.location.href = targetUrl;
                });
            }
        });

        // 3. Navbar Shadow effect on Scroll
        $(window).scroll(function () {
            if ($(this).scrollTop() > 10) {
                $('.navbar').addClass('shadow-sm bg-white');
            } else {
                $('.navbar').removeClass('shadow-sm');
            }
        });
    });
</script>
