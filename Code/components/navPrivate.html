<script>
$(document).ready(function() {
    // 1. Initial Page Fade-In
    $('body').addClass('loaded');

    // 2. Auto-Detect Active Page & Apply Indicator
    var path = window.location.pathname.split("/").pop();
    if (path == '') path = 'dashboard.html'; 

    $('#privateNavbar .nav-link').each(function() {
        if ($(this).attr('href') === path) {
            $(this).addClass('active-page');
        }
    });

    // 3. Smooth Page Redirects
    $('#privateNavbar .nav-link, .navbar-brand, .btn-logout').on('click', function (e) {
        var targetUrl = $(this).attr('href');
        if (targetUrl && targetUrl !== "#" && !targetUrl.startsWith('http')) {
            e.preventDefault();
            $('body').css('opacity', '0');
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 350);
        }
    });

    // 4. Dark Mode Logic (Persistent)
    const body = $('body');
    const darkModeToggle = $('#darkModeToggle');
    const icon = darkModeToggle.find('i');

    if (localStorage.getItem('theme') === 'dark') { enableDarkMode(); }

    darkModeToggle.on('click', function() {
        body.hasClass('dark-mode') ? disableDarkMode() : enableDarkMode();
    });

    function enableDarkMode() {
        body.addClass('dark-mode');
        icon.removeClass('bi-moon-stars').addClass('bi-sun');
        localStorage.setItem('theme', 'dark');
    }

    function disableDarkMode() {
        body.removeClass('dark-mode');
        icon.removeClass('bi-sun').addClass('bi-moon-stars');
        localStorage.setItem('theme', 'light');
    }

    // 5. Scroll Shadow effect
    $(window).scroll(function () {
        $(this).scrollTop() > 10 ? $('#privateNavbar').addClass('shadow-sm') : $('#privateNavbar').removeClass('shadow-sm');
    });
});
</script>
