{% load static %}
{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    .login-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f8f9fa;
    }
</style>

<div class="login-wrapper">
    <form class="bg-white p-3 rounded-4 shadow" style="width:300px;">

        <!-- LOGO -->
        <div class="text-center mb-2">
            <img src="{% static 'images/LOGO.png' %}" alt="SkillUp Logo" height="50">
        </div>

        <div class="text-center fw-semibold py-2 rounded-3 mb-3 bg-success text-white">
            Welcome back!
        </div>

        <div class="mb-2">
            <label class="form-label small">Email:</label>
            <input type="email" class="form-control form-control-sm" placeholder="Enter your Email">
        </div>

        <div class="mb-2">
            <label class="form-label small">Password:</label>
            <input type="password" class="form-control form-control-sm" placeholder="Enter your Password">
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2 small">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="#" class="text-decoration-none">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-success w-100 btn-sm mb-2">
            Log In
        </button>

        <p class="text-center text-muted small mb-2">or</p>

        <button type="button" class="btn btn-secondary w-100 btn-sm mb-2">
            Google Login
        </button>

        <p class="text-center small mb-0">
            Don't have an account? <a href="#" class="text-decoration-none">Sign Up</a>
        </p>

    </form>
</div>

{% endblock %}
